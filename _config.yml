version: 1.1.0
# 你的头像url
avatar: https://testingcf.jsdelivr.net/gh/sanqi-normal/sanqi-normal.github.io/img/avatar.jpg
favicon: https://testingcf.jsdelivr.net/gh/sanqi-normal/sanqi-normal.github.io/img/top.png
#如果博客放置位置不是根目录，则可以通过配置此路径解决静态文件路径错误问题
# 比如访问地址为 yelog.org/blog 那就需要配置为 blog_path: /blog 才能正常访问
blog_path: /

#链接图标 显示顺序和下面顺序一致
link:
  theme: color # 链接样式，color: 彩色图标  white: 黑白图标
  items:
    rss: 
    github: 
    facebook:
    twitter:
    linkedin:
    instagram: 
    reddit: 
    weibo: 
    jianshu: 
    zhihu: 
    csdn:
    oschina: 
    juejin:
    email: 
    qq:
    kugou: 
    neteasemusic: 

##########多作者模式############
author:
  on: false
  authors:
    author1: 
##############################
# 音乐播放器设置
music_player:
  enable: true
  path: /music/chill-synthwave-background-music-for-youtube-shorts-and-videos-345551.mp3
# 文章分类设置
category:
  num: true # 分类显示文章数
  sub: true # 开启多级分类
  sort:
    - 计算机
      - 编程
      - 渗透
      - AI 
      - 操作系统
    - 游戏制作
      - 策划
      - 美术
      - 程序
    - 写作
      - 小说
    - 生活
     - 观后感
     - 旅行
     - 记录
    - 日志
    
     
  width:
    lg: 120 # 1468px<屏幕宽度 左侧分类宽度
    md: 100 # 1024px<屏幕宽度<=1468px 左侧分类宽度
    sm: 100 # 426px<屏幕宽度<=1024px 左侧分类宽度（ipad）
# 多级分类说明：
# 比如在文章中设置多个菜单，则默认为多级菜单，即：工具>hexo
# categories:
#   - 工具
#   - hexo

# 快捷键
shortcutKey: true

# 左下角自定义菜单
menu:
  about:  # '关于' 按钮
    on: true # 是否显示
    url: /about  # 跳转链接
    type: 1 # 跳转类型 1：站内异步跳转 2：当前页面跳转 3：打开新的tab页
  friend: # '友链' 按钮
    on: false # 是否展示
  menus: # 添加的其他菜单写在 menus 下，如下三个菜单：动态菜单1、动态菜单2、动态菜单3
    相册:
      on: true
      url: /photo
      type: 1  # 跳转类型 1：站内异步跳转
    小说:
      on: true
      url: /novel
      type: 1  # 跳转类型 1：站内异步跳转
    Ai:
      on: true
      url: /AI
      type: 2  # 跳转类型 1：站内异步跳转
    github:
      on: false
      url: https://github.com/Sanqi-normal
      type: 3  # 跳转类型 3：打开新的tab页

# 文末声明
article_txt: 此方悬停

bottom_text:  #©2016-2020 Yelog
# 自定义页面最下方的站点版权信息
# 如果不填，则自定义为 ©2017 author (这个author为hexo根目录_config.yml中配置的)

# 底部备案号
miit:
  on: false
  info: 京ICP证030173号
  url: http://beian.miit.gov.cn/ # 默认链接为 http://beian.miit.gov.cn/


reward: false
# true 开启打赏功能

searchAll: true
# true 启用全文搜索
# 开启此功能需要下面操作：
# 1. 在 hexo 根目录 执行 npm install hexo-generator-search --save 安装插件
# 2. 在 hexo 根目录的 _config.xml 中添加下面内容
# search:
#   path: search.xml
#   field: post


copyright: false
# Copyright info. of post | 文末版权信息

word_count: true
# true 开启字数统计
# 开启此功能需要安装插件 ：在 hexo根目录 执行npm i hexo-wordcount --save


# 不蒜子网站计数设置
# http://ibruce.info/2015/04/04/busuanzi/
visit_counter:
  on: true
  site_visit: true
  page_visit: false

##########自定义样式设置##############
# Table of contents | 文章目录
toc:
  max_depth: 3  # 1 - 6 (h1-h6) 目录最大级数

#文章列表 鼠标移上去的样式, 为空时使用默认效果
article_list:
  title: rgba(198, 228, 0, 1) # 文章列表标题颜色
  datetime: "#40dcffff" # 文章发布日期颜色
  hover:
    background: rgba(131, 0, 160, 1)  # 背景色:提供几种：'#c1bfc1'  '#fbf4a8'
    color: '#ffffff'    # 文字颜色 提供几种：'#ffffff'
# 注意：由于颜色如果包含#，使用单引号 ' 引起来

# 文章列表背景图
article_bg_img:
  on: true # 是否开启
  src: https://testingcf.jsdelivr.net/gh/sanqi-normal/sanqi-normal.github.io/img/vaporwave_advanced.jpg

# 列表样式
list: thread
# normal : 普通样式
# thread : 列表外圈有一个线框

# 引用块样式
blockquote: github
# github : 类似于github的引用快
# bracket : 类似于左右两个大括号的样式

# table 的样式
table: green_title
# 为空时类似github的table样式
# green 绿色样式
# green_title 头部为青色的table样式

# 首页背景图
index_bg_img: 
# 其他页面背景图
other_bg_img:

# 点击图片放大样式
img_resize: photoSwipe
# default: 默认(自己写的简单的放大)
# photoSwipe: 使用photoSwipe插件

# 代码段高亮样式，markdown 语法 `demo`
code:
  theme: dark-red
# 支持主题：
# dark-red: 红字(默认)
# github: github样式（灰色底，黑字）

highlight:
  on: true # true开启代码高亮，开启需要关闭博客 _config.yml 中的 highlight
  lineNum: false # true显示行号
  copy: true # 复制功能
  theme: atom-light
# 代码高亮主题,效果可以查看 https://highlightjs.org/static/demo/
# 支持主题：
# sublime : 参考sublime的高亮主题
# darcula : 参考idea中的darcula的主题
# atom-dark : 参考Atom的dark主题
# atom-light : 参考Atom的light主题
# github : 参考GitHub版的高亮主题
# github-gist : GitHub-Gist主题
# brown-paper : 牛皮纸效果
# gruvbox-light : gruvbox的light主题
# gruvbox-dark ： gruvbox的dark主题
# rainbow :
# railscasts :
# sunburst :
# kimbie-dark :
# kimbie-light :
# school-book : 纸张效果
# zenbum : oschina 也选择此高亮主题

# MathJax 数学公式支持
mathjax:
  on: true #是否启用
  per_page: false # 若只渲染单个页面，此选项设为false，页面内加入 mathjax: true

# Mermaid 支持
mermaid:
  on: true
  cdn: //testingcf.jsdelivr.net/npm/mermaid@8.4.2/dist/mermaid.min.js
  #cdn: //cdnjs.cloudflare.com/ajax/libs/mermaid/8.3.1/mermaid.min.js
  options: # 更多配置信息可以参考 https://mermaidjs.github.io/#/mermaidAPI
    theme: 'default'
    startOnLoad: true
    flowchart:
      useMaxWidth: false
      htmlLabels: true

##############################

# 音效设置
sound_effect: true

##########CND设置#############
CDN:
  jquery: //testingcf.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js
  jquery_cookie: //testingcf.jsdelivr.net/npm/jquery.cookie@1.4.1/jquery.cookie.min.js
  howler: //testingcf.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js
  highlight: //testingcf.jsdelivr.net/npm/highlightjs@9.16.2/highlight.pack.min.js
  pjax: //testingcf.jsdelivr.net/npm/jquery-pjax@2.0.1/jquery.pjax.min.js
  animate: //testingcf.jsdelivr.net/npm/animate.css@4.1.0/animate.min.css
  nprogres_js: //testingcf.jsdelivr.net/npm/nprogress@0.2.0/nprogress.min.js
  mathjax: //testingcf.jsdelivr.net/npm/mathjax@2.7.8/unpacked/MathJax.js?config=TeX-MML-AM_CHTML
  photoswipe_js: //testingcf.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe.min.js
  photoswipe_ui_js: //testingcf.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe-ui-default.min.js
  photoswipe_css: //testingcf.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe.min.css
  photoswipe_skin_css: //testingcf.jsdelivr.net/npm/photoswipe@4.1.3/dist/default-skin/default-skin.min.css
##############################
